<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scraped Titles & Links</title>
    <style>
        :root {
            --bg: #0b1020;
            --card: #121a31;
            --text: #e8ecff;
            --muted: #9aa6d1;
            --accent: #6ea8fe;
            --border: #27345e;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #0b1020 0%, #101936 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 16px;
        }

        .header {
            margin-bottom: 18px;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 1.6rem;
        }

        .sub {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .panel {
            background: rgba(18, 26, 49, 0.9);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(4px);
        }

        .toolbar {
            display: flex;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        input[type="search"] {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0f1730;
            color: var(--text);
            outline: none;
        }

        ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .item:last-child {
            border-bottom: none;
        }

        .title {
            margin: 0 0 6px;
            font-weight: 600;
            font-size: 1rem;
        }

        .url {
            color: var(--accent);
            text-decoration: none;
            word-break: break-all;
            font-size: 0.92rem;
        }

        .url:hover {
            text-decoration: underline;
        }

        .empty {
            padding: 20px 16px;
            color: var(--muted);
            text-align: center;
        }

        .count {
            margin-top: 10px;
            color: var(--muted);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <main class="container">
        <header class="header">
            <h1>University Notice Finder</h1>
            <p class="sub">Display and filter results.</p>

            <div class="search-university">
                <label for="university-select" class="sub" style="display:block; margin:10px 0 6px;">Select
                    University</label>
                <select id="university-select" name="university"
                    style="width:100%; max-width:320px; padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:#0f1730; color:var(--text);">
                    <option value="">All Universities</option>
                    {% for university in universities %}
                    <option value="{{ university }}" {% if university==selected_uni %}selected{% endif %}>{{ university
                        }}</option>
                    {% endfor %}
                </select>
            </div>
            <div style="margin-top: 20px; text-align: left;">
                <a href="https://t.me/UOV_notice_bot" target="_blank" style="text-decoration: none;">
                    <button
                        style="padding: 12px 20px; border-radius: 8px; border: none; background: #2481cc; color: #fff; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                        </svg>
                        Get Notifications via Telegram
                    </button>
                </a>
            </div>

            <div
                style="margin-top: 24px; background: rgba(18,26,49,0.9); border: 1px solid var(--border); border-radius: 12px; padding: 20px;">
                <h2 style="margin: 0 0 6px; font-size: 1.1rem;">📧 Subscribe for Email Alerts</h2>
                <p style="color: var(--muted); font-size: 0.9rem; margin: 0 0 16px;">You will receive email alerts for
                    new notices.</p>

                <div style="display: flex; flex-direction: column; gap: 10px; max-width: 420px;">

                    <input type="text" id="sub-name" placeholder="Your Name"
                        style="padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:#0f1730; color:var(--text); outline:none;" />

                    <input type="email" id="sub-email" placeholder="email@example.com"
                        style="padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:#0f1730; color:var(--text); outline:none;" />

                    <select id="sub-university"
                        style="padding:10px 12px; border-radius:8px; border:1px solid var(--border); background:#0f1730; color:var(--text);">
                        <option value="">-- Select University --</option>
                        {% for university in universities %}
                        <option value="{{ university }}">{{ university }}</option>
                        {% endfor %}
                    </select>

                    <button onclick="subscribeEmail()"
                        style="padding:11px; border-radius:8px; border:none; background:#004a99; color:#fff; font-weight:bold; cursor:pointer;">
                        Subscribe
                    </button>

                    <!-- Success / Error message -->
                    <p id="sub-msg" style="margin:0; font-size:0.9rem; display:none;"></p>
                </div>
            </div>
        </header>

        <section class="panel">
            <div class="toolbar">
                <input id="search" type="search" placeholder="Search by title or URL..." />
            </div>
            <ul id="results"></ul>
            <div id="empty" class="empty" hidden>No results found.</div>
        </section>

        <div id="count" class="count"></div>
    </main>

    <script id="notices-json" type="application/json">{{ notices_json | safe }}</script>
    <script>

        const data = JSON.parse(document.getElementById("notices-json").textContent || "[]");

        const resultsEl = document.getElementById("results");
        const emptyEl = document.getElementById("empty");
        const searchEl = document.getElementById("search");
        const countEl = document.getElementById("count");

        function render(items) {
            resultsEl.innerHTML = "";

            if (!items.length) {
                emptyEl.hidden = false;
                countEl.textContent = "0 results";
                return;
            }

            emptyEl.hidden = true;
            items.forEach(item => {
                const li = document.createElement("li");
                li.className = "item";
                li.innerHTML = `
                    <p class="title">${escapeHtml(item.title)}</p>
                    <a class="url" href="${item.link}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.link)}</a>
                `;
                resultsEl.appendChild(li);
            });

            countEl.textContent = `${items.length} result${items.length > 1 ? "s" : ""}`;
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        const uniSelect = document.getElementById("university-select");

        uniSelect.addEventListener("change", function () {
            const selectedUniversity = this.value;

            if (selectedUniversity) {
                window.location.href = "/?university=" + encodeURIComponent(selectedUniversity);
            } else {
                window.location.href = "/";
            }
        });

        searchEl.addEventListener("input", () => {
            const q = searchEl.value.trim().toLowerCase();
            const filtered = data.filter(item =>
                item.title.toLowerCase().includes(q) || item.link.toLowerCase().includes(q)
            );
            render(filtered);
        });

        render(data);

        async function subscribeEmail() {
            const name = document.getElementById("sub-name").value.trim();
            const email = document.getElementById("sub-email").value.trim();
            const university = document.getElementById("sub-university").value;
            const msgEl = document.getElementById("sub-msg");

            // Frontend validation
            if (!name || !email || !university) {
                msgEl.style.color = "#f87171";   // red
                msgEl.textContent = "⚠️ All fields must be filled!";
                msgEl.style.display = "block";
                return;
            }

            // Basic email format check
            try {
                const response = await fetch("/subscribe", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, university })
                });

                const result = await response.json();

                if (result.success) {
                    msgEl.style.color = "#4ade80";   // green
                    msgEl.textContent = "✅ " + result.message;
                    // Form clear 
                    document.getElementById("sub-name").value = "";
                    document.getElementById("sub-email").value = "";
                    document.getElementById("sub-university").value = "";
                } else {
                    msgEl.style.color = "#f87171";   // red
                    msgEl.textContent = "❌ " + result.message;
                }

                msgEl.style.display = "block";

            } catch (err) {
                msgEl.style.color = "#f87171";
                msgEl.textContent = "❌ Server error! Please try again later.";
                msgEl.style.display = "block";
            }
        }

    </script>
</body>

</html>
